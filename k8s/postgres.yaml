apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortly-postgres
  namespace: shortly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shortly-postgres
  template:
    metadata:
      labels:
        app: shortly-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: shortly
            - name: POSTGRES_USER
              value: shortly
            - name: POSTGRES_PASSWORD
              value: shortly123
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: shortly
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: shortly-postgres
  namespace: shortly
spec:
  selector:
    app: shortly-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
