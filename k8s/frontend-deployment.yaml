apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortly-frontend
  namespace: shortly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shortly-frontend
  template:
    metadata:
      labels:
        app: shortly-frontend
    spec:
      containers:
        - name: shortly-frontend
          image: psbora185/shortly-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
