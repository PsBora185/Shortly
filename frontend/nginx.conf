server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://shortly-backend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ~ "^/(?!(login|register|app|admin|forgot-password|analytics|assets|api))[A-Za-z0-9_-]{4,32}$" {
    # Proxy shortcodes, excluding known React routes
    proxy_pass http://shortly-backend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
